edition = "2023";

package pb;

option features.field_presence = IMPLICIT;
option go_package = "github.com/criyle/go-judge/pb";
option features.(pb.go).api_level = API_OPAQUE;

import "google/protobuf/empty.proto";
import "request.proto";
import "google/protobuf/go_features.proto";

message StreamRequest {
  message Input {
    uint32 index = 1;
    uint32 fd = 3;
    bytes content = 2;
  }

  message Resize {
    uint32 index = 1;
    uint32 fd = 6;
    uint32 rows = 2;
    uint32 cols = 3;
    uint32 x = 4;
    uint32 y = 5;
  }

  message Control {
    message BeginTurn {
      uint64 turnId = 1;
      uint64 moveCpuLimit = 2;
      uint64 totalCpuLimit = 3;
      uint64 wallLimit = 4;
      uint32 outputFd = 5;
      bytes delimiter = 6;
      uint32 maxOutput = 7;
    }

    uint32 index = 1;
    BeginTurn beginTurn = 2;
  }

  oneof request {
    Request execRequest = 1;
    Input execInput = 2;
    Resize execResize = 3;
    google.protobuf.Empty execCancel = 4;
    Control execControl = 5;
  }
}
