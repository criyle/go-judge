edition = "2023";

package pb;

option features.field_presence = IMPLICIT;
option go_package = "github.com/criyle/go-judge/pb";
option features.(pb.go).api_level = API_OPAQUE;

import "response.proto";
import "google/protobuf/go_features.proto";

message StreamResponse {
  message Output {
    uint32 index = 1;
    uint32 fd = 3;
    bytes content = 2;
  }

  message Control {
    string requestId = 1;
    uint32 index = 2;
    uint64 turnId = 3;
    string type = 4;
    uint64 moveCpu = 5;
    uint64 totalCpu = 6;
    uint64 wallTime = 7;
    bytes output = 8;
    string error = 9;
  }

  oneof response {
    Response execResponse = 1;
    Output execOutput = 2;
    Control execControl = 3;
  }
}
